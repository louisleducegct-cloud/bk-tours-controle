<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#C8390A">
<title>BK Tours de Contrôle</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bk: #C8390A;
  --bk2: #E8470D;
  --bk-dark: #8B2500;
  --bk-light: #FFF0EB;
  --gold: #F5A623;
  --ok: #1E7A3E;
  --ok-bg: #E8F5EE;
  --nok: #C0392B;
  --nok-bg: #FDECEA;
  --na: #5D6D7E;
  --na-bg: #EEF0F2;
  --bg: #FAFAF8;
  --bg2: #F2F0ED;
  --bg3: #E8E5E0;
  --text: #1A1714;
  --text2: #6B6560;
  --text3: #A09A94;
  --border: rgba(0,0,0,0.08);
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius-lg: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, var(--bk-dark) 0%, var(--bk) 60%, var(--bk2) 100%);
  padding: 0 20px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  flex-shrink: 0;
  position: relative;

}
.header::before {
  content: '';
  position: absolute;
  right: -20px; top: -20px;
  width: 120px; height: 120px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.logo {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: 14px; color: #fff;
  letter-spacing: -0.5px;
}
.header-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 17px; color: #fff; }
.header-sub { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 1px; }
.shift-pill {
  background: rgba(255,255,255,0.18);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
  white-space: nowrap;
}

/* ── MAIN ── */
.main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.content { padding: 16px; max-width: 800px; margin: 0 auto; padding-bottom: 120px; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: sticky; bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 9999;
  padding-bottom: 20px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.12);
  min-height: 70px;
}
.nav-btn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 4px 6px;
  border: none; background: transparent;
  color: var(--text3); cursor: pointer;
  font-family: 'Barlow', sans-serif;
  gap: 4px; position: relative;
  transition: color 0.15s;
}
.nav-btn.active { color: var(--bk); }
.nav-btn.active::after {
  content: '';
  position: absolute; top: 0; left: 20%; right: 20%; height: 3px;
  background: var(--bk); border-radius: 0 0 3px 3px;
}
.nav-icon { font-size: 24px; line-height: 1; }
.nav-label { font-size: 11px; font-weight: 700; letter-spacing: 0.3px; }
.nav-badge {
  position: absolute; top: 5px; right: calc(50% - 22px);
  background: var(--nok); color: #fff;
  border-radius: 50%; width: 17px; height: 17px;
  font-size: 9px; font-weight: 700;
  display: none; align-items: center; justify-content: center;
}
.nav-badge.show { display: flex; }

/* ── SECTIONS ── */
.sec { display: none; }
.sec.active { display: block; }

/* ── CARDS ── */
.card {
  background: #fff;
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.card-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 13px;
  color: var(--text2); letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

/* ── INFO GRID ── */
.info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
.info-cell {
  background: var(--bg2);
  border-radius: var(--radius);
  padding: 12px 14px;
}
.info-cell label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
  color: var(--text3); text-transform: uppercase;
  display: block; margin-bottom: 4px;
}
.info-cell .val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 700; color: var(--text);
}
.info-cell select, .info-cell input {
  font-family: 'Barlow', sans-serif;
  font-size: 15px; font-weight: 600;
  background: transparent; border: none;
  color: var(--text); width: 100%; outline: none;
  cursor: pointer;
}
.info-cell select option { background: #fff; }
.info-cell.highlight { background: var(--bk-light); }
.info-cell.highlight label { color: var(--bk-dark); }

/* ── PROGRESS ── */
.prog-wrap { margin-bottom: 14px; }
.prog-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.prog-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--bk), var(--gold)); border-radius: 3px; transition: width 0.4s ease; }

/* ── ZONES ── */
.zones { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
.zones::-webkit-scrollbar { display: none; }
.zone-btn {
  padding: 6px 14px; font-size: 12px; font-weight: 600;
  border-radius: 20px; border: 1.5px solid var(--border);
  background: #fff; color: var(--text2);
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  flex-shrink: 0;
  font-family: 'Barlow', sans-serif;
  transition: all 0.15s;
}
.zone-btn.active { background: var(--bk); color: #fff; border-color: var(--bk); }

/* ── CHECKLIST ── */
.zone-group { margin-bottom: 14px; }
.zone-header {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 13px; letter-spacing: 0.5px;
  text-transform: uppercase; color: var(--text2);
  margin-bottom: 6px; padding: 8px 0;
  display: flex; align-items: center; gap: 6px;
}
.check-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: #fff;
  border-radius: var(--radius);
  margin-bottom: 4px;
  border: 1px solid var(--border);
  transition: box-shadow 0.15s;
}
.check-row:active { box-shadow: var(--shadow); }
.check-info { flex: 1; min-width: 0; }
.check-label { font-size: 13px; font-weight: 600; color: var(--text); }
.check-detail { font-size: 11px; color: var(--text3); margin-top: 2px; }
.check-btns { display: flex; gap: 4px; flex-shrink: 0; }
.cbtn {
  font-size: 11px; font-weight: 700;
  padding: 5px 9px; border-radius: 8px;
  border: 1.5px solid var(--border);
  cursor: pointer; background: transparent;
  font-family: 'Barlow', sans-serif;
  color: var(--text2); transition: all 0.12s;
  letter-spacing: 0.3px;
}
.cbtn.ok-active { background: var(--ok-bg); color: var(--ok); border-color: var(--ok); }
.cbtn.nok-active { background: var(--nok-bg); color: var(--nok); border-color: var(--nok); }
.cbtn.na-active { background: var(--na-bg); color: var(--na); border-color: var(--na); }

/* ── RESULT BAR ── */
.result-bar {
  background: linear-gradient(135deg, var(--bk-dark), var(--bk));
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
  box-shadow: var(--shadow-lg);
}
.result-score { display: flex; gap: 16px; }
.rscore { text-align: center; }
.rscore .num { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; color: #fff; }
.rscore .lbl { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.5px; }
.result-pct {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 38px; font-weight: 800; color: var(--gold);
}

/* ── BOUTON ENREGISTRER ── */
.btn-register {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, var(--ok) 0%, #27AE60 100%);
  color: #fff; border: none;
  border-radius: var(--radius-lg);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 700; letter-spacing: 0.5px;
  cursor: pointer; margin-bottom: 8px;
  box-shadow: 0 4px 16px rgba(30,122,62,0.3);
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn-register:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(30,122,62,0.2); }

.btn-reset {
  width: 100%; padding: 12px;
  background: transparent; color: var(--text2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-family: 'Barlow', sans-serif;
  font-size: 14px; font-weight: 600;
  cursor: pointer; margin-bottom: 12px;
}

/* ── BADGES ── */
.badge {
  font-size: 11px; font-weight: 700; padding: 3px 10px;
  border-radius: 20px; display: inline-block; letter-spacing: 0.3px;
}
.b-ok { background: var(--ok-bg); color: var(--ok); }
.b-nok { background: var(--nok-bg); color: var(--nok); }
.b-warn { background: #FEF9E7; color: #B7770D; }
.b-gray { background: var(--bg2); color: var(--text2); }

/* ── HISTORY ── */
.hist-card {
  background: #fff;
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.hist-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; flex-wrap: wrap; gap: 6px; }
.hist-date { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; }
.hist-meta { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.hist-badges { display: flex; gap: 5px; flex-wrap: wrap; }
.hist-nok { font-size: 11px; color: var(--nok); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }

/* ── STATS ── */
.stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 14px; }
.stat-card { background: #fff; border-radius: var(--radius-lg); padding: 14px; border: 1px solid var(--border); box-shadow: var(--shadow); text-align: center; }
.stat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; color: var(--bk); }
.stat-lbl { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

.mgr-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.mgr-row:last-child { border-bottom: none; }
.mgr-name { flex: 1; font-weight: 600; font-size: 14px; }
.mgr-stats { display: flex; gap: 8px; align-items: center; }

/* ── CHART ── */
.chart-wrap { overflow-x: auto; }

/* ── CONFIG ── */
.cfg-field { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 10px; }
.cfg-field:last-child { border-bottom: none; }
.cfg-field label { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }
.cfg-field input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--bk); flex-shrink: 0; }
.cfg-input {
  font-family: 'Barlow', sans-serif; font-size: 14px;
  background: var(--bg2); border: none; border-radius: 8px;
  padding: 8px 12px; color: var(--text); outline: none; width: 100%; margin-bottom: 8px;
}

/* ── NOTIFS ── */
.notif-item { display: flex; gap: 10px; padding: 12px; border-radius: var(--radius); margin-bottom: 6px; border: 1px solid var(--border); align-items: flex-start; }
.notif-item.unread { background: var(--bg2); }
.ndot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.nmsg { flex: 1; font-size: 13px; color: var(--text); line-height: 1.5; }
.ntime { font-size: 11px; color: var(--text3); flex-shrink: 0; }

/* ── ALERT ── */
.alert { padding: 12px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 600; margin-bottom: 10px; display: none; }
.alert.show { display: block; }
.alert-ok { background: var(--ok-bg); color: var(--ok); }
.alert-err { background: var(--nok-bg); color: var(--nok); }

/* ── EMPTY ── */
.empty { text-align: center; padding: 48px 20px; color: var(--text2); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

/* ── TEXTAREA ── */
textarea {
  width: 100%; font-family: 'Barlow', sans-serif; font-size: 13px;
  background: var(--bg2); border: none; border-radius: var(--radius);
  padding: 12px; color: var(--text); resize: vertical; min-height: 64px;
  outline: none; margin-top: 8px;
}

.btn-sec {
  background: transparent; color: var(--text);
  border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 8px 14px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: 'Barlow', sans-serif;
}

@media (min-width: 640px) {
  .info-grid { grid-template-columns: repeat(4, 1fr); }
  .stats-grid { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">BK</div>
    <div>
      <div class="header-title">Tours de Contrôle</div>
      <div class="header-sub" id="restNameHeader">Restaurant</div>
    </div>
  </div>
  <div class="shift-pill" id="shiftPill">Service midi</div>
</div>

<!-- MAIN -->
<div class="main" id="mainScroll">
<div class="content">

  <!-- ══ TOURNÉE ══ -->
  <div id="sec-tournee" class="sec active">

    <div class="info-grid">
      <div class="info-cell">
        <label>Date</label>
        <div class="val" id="dateVal"></div>
      </div>
      <div class="info-cell">
        <label>Heure</label>
        <div class="val" id="heureVal"></div>
      </div>
      <div class="info-cell highlight">
        <label>Manager ▼</label>
        <select id="selManager" onchange="updShift()">
          <option value="">-- Choisir --</option>
        </select>
      </div>
      <div class="info-cell highlight">
        <label>Service ▼</label>
        <select id="selService" onchange="updShift()">
          <option value="Ouverture">Ouverture</option>
          <option value="Midi" selected>Midi</option>
          <option value="Après-midi">Après-midi</option>
          <option value="Soir">Soir</option>
          <option value="Fermeture">Fermeture</option>
          <option value="Nuit">Nuit</option>
        </select>
      </div>
    </div>

    <div class="prog-wrap">
      <div class="prog-top"><span>Progression</span><span id="progLbl">0 / 0</span></div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>

    <div class="zones" id="zonesRow"></div>
    <div id="checklistContainer"></div>

    <div class="result-bar">
      <div class="result-score">
        <div class="rscore"><div class="num" id="resOK">0</div><div class="lbl">OK</div></div>
        <div class="rscore"><div class="num" id="resNOK">0</div><div class="lbl">NOK</div></div>
        <div class="rscore"><div class="num" id="resNA">0</div><div class="lbl">N/A</div></div>
      </div>
      <div class="result-pct" id="resPCT">-%</div>
    </div>

    <div class="card">
      <div class="card-title">Observations générales</div>
      <textarea id="gNote" placeholder="Anomalies, remarques, actions correctives..."></textarea>
    </div>

    <div class="alert alert-ok" id="alertOK">✓ Tournée enregistrée avec succès !</div>
    <div class="alert alert-err" id="alertErr"></div>

    <button class="btn-register" onclick="saveTournee()">✓ ENREGISTRER LA TOURNÉE</button>
    <button class="btn-reset" onclick="resetTournee()">↺ Réinitialiser la checklist</button>
  </div>

  <!-- ══ HISTORIQUE ══ -->
  <div id="sec-historique" class="sec">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700">Historique</span>
      <button class="btn-sec" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div id="histList"></div>
  </div>

  <!-- ══ STATISTIQUES ══ -->
  <div id="sec-stats" class="sec">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:14px">Statistiques</div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="card" id="statsChart"></div>
    <div class="card" id="statsMgr"></div>
  </div>

  <!-- ══ CONFIG ══ -->
  <div id="sec-config" class="sec">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:14px">Configuration</div>

    <div class="card">
      <div class="card-title">Restaurant</div>
      <input class="cfg-input" id="cfgName" placeholder="Nom du restaurant" oninput="updRestName()"/>
      <input class="cfg-input" id="cfgNum" placeholder="Numéro de restaurant"/>
      <input class="cfg-input" id="cfgDir" placeholder="Directeur / Responsable"/>
      <input class="cfg-input" id="cfgGoal" type="number" value="90" placeholder="Objectif conformité (%)"/>
    </div>

    <div class="card">
      <div class="card-title">
        <span>Managers</span>
        <button class="btn-sec" onclick="addManager()" style="font-size:12px;padding:4px 10px">+ Ajouter</button>
      </div>
      <div id="mgrList"></div>
    </div>

    <div class="card">
      <div class="card-title">Notifications</div>
      <div class="cfg-field"><label>Alerte si points NOK</label><input type="checkbox" id="cfgNok" checked></div>
      <div class="cfg-field"><label>Alerte si objectif non atteint</label><input type="checkbox" id="cfgGoalNotif" checked></div>
      <div class="cfg-field"><label>Confirmation enregistrement</label><input type="checkbox" id="cfgSave" checked></div>
    </div>

    <button class="btn-register" onclick="saveConfig()" style="background:linear-gradient(135deg,var(--bk-dark),var(--bk))">
      Enregistrer la configuration
    </button>
    <div class="alert alert-ok" id="cfgAlert" style="margin-top:10px">Configuration enregistrée !</div>
  </div>

</div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="goTab('tournee',this)" data-tab="tournee">
    <span class="nav-icon">📋</span><span class="nav-label">Tournée</span>
  </button>
  <button class="nav-btn" onclick="goTab('historique',this)" data-tab="historique">
    <span class="nav-icon">📁</span><span class="nav-label">Historique</span>
  </button>
  <button class="nav-btn" onclick="goTab('stats',this)" data-tab="stats">
    <span class="nav-icon">📊</span><span class="nav-label">Stats</span>
  </button>
  <button class="nav-btn" onclick="goTab('config',this)" data-tab="config">
    <span class="nav-icon">⚙️</span><span class="nav-label">Config</span>
  </button>
</nav>

<script>
// ══════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════
const DEFAULT_MANAGERS = ["Enock","Brice","Cecilia","Anais","Gwendeline","Karine","Chloé","Clement"];

const CHECKS = [
  {id:'c1',zone:'cuisine',label:'Températures équipements',detail:'Friteuses, grills, bain-marie, chambres froides'},
  {id:'c2',zone:'cuisine',label:'Propreté des postes de travail',detail:'Plans de travail, équipements, sol cuisine'},
  {id:'c3',zone:'cuisine',label:'DLC / DLUO des produits',detail:'Vérifier les dates, étiquetage FIFO'},
  {id:'c4',zone:'cuisine',label:'Niveaux des stocks',detail:'Viandes, pains, sauces, légumes'},
  {id:'c5',zone:'cuisine',label:'Fonctionnement équipements',detail:'Friteuses, grills, toasters, micro-ondes'},
  {id:'c6',zone:'cuisine',label:'Traçabilité & enregistrements',detail:'Feuilles de relevé de températures remplies'},
  {id:'c7',zone:'comptoir',label:'Propreté comptoir & caisses',detail:'Surfaces, écrans, claviers, plateaux'},
  {id:'c8',zone:'comptoir',label:'Affichage prix & promotions',detail:'Menus à jour, PLV correcte'},
  {id:'c9',zone:'comptoir',label:'Stock emballages / consommables',detail:'Sacs, gobelets, plateaux, serviettes'},
  {id:'c10',zone:'comptoir',label:"Temps d'attente clients",detail:'Objectif < 3 min au comptoir'},
  {id:'c11',zone:'comptoir',label:'Fonds de caisse',detail:'Vérification des caisses'},
  {id:'c12',zone:'salle',label:'Propreté tables & chaises',detail:'Tables essuyées, chaises en place'},
  {id:'c13',zone:'salle',label:'Sol de la salle propre',detail:'Nettoyage, absence de déchets'},
  {id:'c14',zone:'salle',label:'Poubelles & tri des déchets',detail:'< 2/3 pleines, tri sélectif correct'},
  {id:'c15',zone:'salle',label:'Toilettes clients',detail:'Propreté, savon, papier, poubelle'},
  {id:'c16',zone:'securite',label:'Issues de secours dégagées',detail:'Accès libre, signalisation visible'},
  {id:'c17',zone:'securite',label:'Extincteurs accessibles',detail:'Non obstrués, contrôle à jour'},
  {id:'c18',zone:'securite',label:'Éclairage de sécurité',detail:'Blocs de secours fonctionnels'},
  {id:'c19',zone:'hygiene',label:'Tenue vestimentaire équipe',detail:'Uniforme, charlotte, gants si requis'},
  {id:'c20',zone:'hygiene',label:'Lavage des mains',detail:'Protocole respecté aux postes clés'},
  {id:'c21',zone:'hygiene',label:'Produits nettoyage rangés',detail:'Armoire fermée, étiquetés, séparés'},
  {id:'c22',zone:'hygiene',label:'Lave-mains opérationnel',detail:'Savon, essuie-mains disponibles'},
];

const ZONES = {
  cuisine:  {label:'Cuisine',  icon:'🍔'},
  comptoir: {label:'Comptoir', icon:'🧾'},
  salle:    {label:'Salle',    icon:'🪑'},
  securite: {label:'Sécurité', icon:'🔒'},
  hygiene:  {label:'Hygiène',  icon:'🧼'},
};

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let statuses = {};
let curZone = 'all';
let history = [];
let managers = [...DEFAULT_MANAGERS];
let unread = 0;

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
function init() {
  loadStorage();
  setDateTime();
  setInterval(setDateTime, 60000);
  renderManagerSelect();
  renderZones();
  renderChecklist();
  renderHistory();
  renderStats();
  renderManagerConfig();
  updRestName();
  updShift();
}

function setDateTime() {
  const now = new Date();
  document.getElementById('dateVal').textContent =
    now.toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric'});
  document.getElementById('heureVal').textContent =
    now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
}

function loadStorage() {
  try {
    const h = localStorage.getItem('bk_hist'); if(h) history = JSON.parse(h);
    const m = localStorage.getItem('bk_mgrs'); if(m) managers = JSON.parse(m);
    const c = localStorage.getItem('bk_cfg');
    if(c) {
      const cfg = JSON.parse(c);
      if(cfg.name) { document.getElementById('cfgName').value = cfg.name; }
      if(cfg.num)  document.getElementById('cfgNum').value = cfg.num;
      if(cfg.dir)  document.getElementById('cfgDir').value = cfg.dir;
      if(cfg.goal) document.getElementById('cfgGoal').value = cfg.goal;
    }
  } catch(e) {}
}

function saveStorage() {
  try {
    localStorage.setItem('bk_hist', JSON.stringify(history.slice(0,200)));
    localStorage.setItem('bk_mgrs', JSON.stringify(managers));
  } catch(e) {}
}

function saveCfgStorage() {
  try {
    localStorage.setItem('bk_cfg', JSON.stringify({
      name: document.getElementById('cfgName').value,
      num:  document.getElementById('cfgNum').value,
      dir:  document.getElementById('cfgDir').value,
      goal: document.getElementById('cfgGoal').value,
    }));
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════
function goTab(name, el) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  document.querySelectorAll('[data-tab="'+name+'"]').forEach(b => b.classList.add('active'));
  document.getElementById('mainScroll').scrollTo(0,0);
  if(name === 'historique') renderHistory();
  if(name === 'stats') renderStats();
  if(name === 'config') renderManagerConfig();
}

// ══════════════════════════════════════════════════════════
// HEADER
// ══════════════════════════════════════════════════════════
function updShift() {
  const svc = document.getElementById('selService').value;
  document.getElementById('shiftPill').textContent = svc;
}

function updRestName() {
  const v = document.getElementById('cfgName').value || 'Restaurant';
  document.getElementById('restNameHeader').textContent = v;
}

// ══════════════════════════════════════════════════════════
// MANAGERS
// ══════════════════════════════════════════════════════════
function renderManagerSelect() {
  const sel = document.getElementById('selManager');
  const cur = sel.value;
  sel.innerHTML = '<option value="">-- Choisir --</option>' +
    managers.map(m => `<option value="${m}" ${m===cur?'selected':''}>${m}</option>`).join('');
}

function renderManagerConfig() {
  const el = document.getElementById('mgrList');
  el.innerHTML = managers.map((m,i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
      <input value="${m}" onchange="managers[${i}]=this.value;renderManagerSelect()"
        style="flex:1;font-family:'Barlow',sans-serif;font-size:14px;background:var(--bg2);border:none;border-radius:8px;padding:8px 12px;outline:none"/>
      <button onclick="removeManager(${i})" style="background:none;border:none;cursor:pointer;color:var(--nok);font-size:16px">✕</button>
    </div>`).join('');
}

function addManager() {
  managers.push('Nouveau manager');
  renderManagerConfig();
  renderManagerSelect();
}

function removeManager(i) {
  managers.splice(i,1);
  renderManagerConfig();
  renderManagerSelect();
}

// ══════════════════════════════════════════════════════════
// ZONES & CHECKLIST
// ══════════════════════════════════════════════════════════
function renderZones() {
  const zones = ['all', ...Object.keys(ZONES)];
  document.getElementById('zonesRow').innerHTML = zones.map(z => {
    const lbl = z === 'all' ? 'Tout' : ZONES[z].label;
    return `<button class="zone-btn${z===curZone?' active':''}" onclick="filterZone('${z}',this)">${lbl}</button>`;
  }).join('');
}

function filterZone(z, el) {
  curZone = z;
  document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderChecklist();
}

function setStatus(id, st) {
  statuses[id] = statuses[id] === st ? null : st;
  renderChecklist();
  updResult();
}

function renderChecklist() {
  const filtered = curZone === 'all' ? CHECKS : CHECKS.filter(c => c.zone === curZone);
  const grouped = {};
  filtered.forEach(c => { if(!grouped[c.zone]) grouped[c.zone]=[]; grouped[c.zone].push(c); });

  let html = '';
  Object.entries(grouped).forEach(([zone, items]) => {
    const z = ZONES[zone];
    html += `<div class="zone-group">
      <div class="zone-header">${z.icon} ${z.label}</div>`;
    items.forEach(item => {
      const st = statuses[item.id];
      html += `<div class="check-row">
        <div class="check-info">
          <div class="check-label">${item.label}</div>
          <div class="check-detail">${item.detail}</div>
        </div>
        <div class="check-btns">
          <button class="cbtn${st==='ok'?' ok-active':''}" onclick="setStatus('${item.id}','ok')">OK</button>
          <button class="cbtn${st==='nok'?' nok-active':''}" onclick="setStatus('${item.id}','nok')">NOK</button>
          <button class="cbtn${st==='na'?' na-active':''}" onclick="setStatus('${item.id}','na')">N/A</button>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('checklistContainer').innerHTML = html;
  updResult();
  updProgress();
}

function updProgress() {
  const done = CHECKS.filter(c => statuses[c.id]).length;
  const pct = CHECKS.length ? Math.round(done/CHECKS.length*100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLbl').textContent = done + ' / ' + CHECKS.length;
}

function updResult() {
  const ok  = CHECKS.filter(c => statuses[c.id] === 'ok').length;
  const nok = CHECKS.filter(c => statuses[c.id] === 'nok').length;
  const na  = CHECKS.filter(c => statuses[c.id] === 'na').length;
  const pct = (ok+nok) > 0 ? Math.round(ok/(ok+nok)*100) : 0;
  document.getElementById('resOK').textContent  = ok;
  document.getElementById('resNOK').textContent = nok;
  document.getElementById('resNA').textContent  = na;
  document.getElementById('resPCT').textContent = (ok+nok)>0 ? pct+'%' : '-%';
}

// ══════════════════════════════════════════════════════════
// SAVE TOURNÉE
// ══════════════════════════════════════════════════════════
function saveTournee() {
  const manager = document.getElementById('selManager').value;
  const service = document.getElementById('selService').value;

  if(!manager) { showAlert('alertErr', 'Veuillez sélectionner un manager !'); return; }

  const ok  = CHECKS.filter(c => statuses[c.id] === 'ok').length;
  const nok = CHECKS.filter(c => statuses[c.id] === 'nok').length;
  const na  = CHECKS.filter(c => statuses[c.id] === 'na').length;

  if(ok + nok === 0) { showAlert('alertErr', 'Veuillez remplir la checklist avant d\'enregistrer !'); return; }

  const pct  = Math.round(ok/(ok+nok)*100);
  const note = document.getElementById('gNote').value;
  const nokItems = CHECKS.filter(c => statuses[c.id]==='nok').map(c => c.label);
  const goal = parseInt(document.getElementById('cfgGoal').value) || 90;
  const now  = new Date();

  const entry = {
    id: Date.now(),
    date: now.toLocaleDateString('fr-FR'),
    time: now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    manager, service, ok, nok, na,
    total: CHECKS.length, pct, note, nokItems,
    statuses: {...statuses}
  };

  history.unshift(entry);
  saveStorage();

  showAlert('alertOK', `✓ Tournée enregistrée — ${pct}% conforme`);

  if(document.getElementById('cfgNok').checked && nok > 0) {
    addNotif(`${nok} point${nok>1?'s':''} NOK : ${nokItems.slice(0,3).join(', ')}${nokItems.length>3?'…':''}`, 'danger');
  }
  if(document.getElementById('cfgGoalNotif').checked && pct < goal) {
    addNotif(`Conformité ${pct}% — objectif ${goal}% non atteint`, 'warning');
  }

  setTimeout(() => {
    if(confirm('Tournée enregistrée ! Réinitialiser la checklist pour une nouvelle tournée ?')) {
      resetTournee();
    }
  }, 500);
}

function resetTournee() {
  statuses = {};
  document.getElementById('gNote').value = '';
  curZone = 'all';
  renderZones();
  renderChecklist();
  setDateTime();
}

function addNotif(msg, type) {
  // Simple notification storage
  const notifs = JSON.parse(localStorage.getItem('bk_notifs')||'[]');
  const now = new Date();
  notifs.unshift({msg, type, time: now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}), read:false, id:Date.now()});
  localStorage.setItem('bk_notifs', JSON.stringify(notifs.slice(0,50)));
}

function showAlert(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

// ══════════════════════════════════════════════════════════
// HISTORY
// ══════════════════════════════════════════════════════════
function renderHistory() {
  const el = document.getElementById('histList');
  if(!history.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>Aucune tournée enregistrée</p></div>';
    return;
  }
  el.innerHTML = history.map(h => {
    const cls = h.pct >= 90 ? 'b-ok' : h.pct >= 70 ? 'b-warn' : 'b-nok';
    return `<div class="hist-card">
      <div class="hist-head">
        <div class="hist-date">${h.date} — ${h.time}</div>
        <span class="badge ${cls}">${h.pct}%</span>
      </div>
      <div class="hist-meta">${h.service} · ${h.manager}</div>
      <div class="hist-badges">
        <span class="badge b-ok">${h.ok} OK</span>
        <span class="badge b-nok">${h.nok} NOK</span>
        <span class="badge b-gray">${h.na} N/A</span>
      </div>
      ${h.nokItems && h.nokItems.length ? `<div class="hist-nok">NOK : ${h.nokItems.join(' · ')}</div>` : ''}
      ${h.note ? `<div style="font-size:12px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">${h.note}</div>` : ''}
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════════════
function renderStats() {
  if(!history.length) {
    document.getElementById('statsGrid').innerHTML = '<p style="color:var(--text2);font-size:14px;grid-column:1/-1">Aucune donnée</p>';
    document.getElementById('statsChart').innerHTML = '<p style="color:var(--text2);font-size:14px">Lancez des tournées pour voir les statistiques</p>';
    document.getElementById('statsMgr').innerHTML = '';
    return;
  }

  const total = history.length;
  const avgPct = Math.round(history.reduce((s,h) => s+h.pct, 0) / total);
  const avgNok = Math.round(history.reduce((s,h) => s+h.nok, 0) / total * 10) / 10;
  const best = Math.max(...history.map(h=>h.pct));

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Tournées</div></div>
    <div class="stat-card"><div class="stat-num">${avgPct}%</div><div class="stat-lbl">Conf. moy.</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--nok)">${avgNok}</div><div class="stat-lbl">NOK moy.</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--ok)">${best}%</div><div class="stat-lbl">Meilleure</div></div>`;

  // Chart
  const last = history.slice(0,8).reverse();
  if(last.length > 1) {
    const W=500, H=100, pad=24;
    const pts = last.map((h,i) => ({
      x: pad + i*((W-2*pad)/(last.length-1)),
      y: H - (h.pct/100)*H,
      pct: h.pct, date: h.date.slice(0,5)
    }));
    const path = pts.map((p,i) => (i?'L':'M')+p.x+','+p.y).join(' ');
    document.getElementById('statsChart').innerHTML = `
      <div class="card-title">Évolution conformité</div>
      <div class="chart-wrap">
        <svg viewBox="0 0 ${W} ${H+28}" style="width:100%;min-width:300px;overflow:visible">
          <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C8390A"/><stop offset="100%" stop-color="#F5A623"/></linearGradient></defs>
          <path d="${path}" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          ${pts.map(p => `
            <circle cx="${p.x}" cy="${p.y}" r="5" fill="url(#g)"/>
            <text x="${p.x}" y="${p.y-10}" text-anchor="middle" font-size="11" font-family="Barlow,sans-serif" font-weight="600" fill="#C8390A">${p.pct}%</text>
            <text x="${p.x}" y="${H+20}" text-anchor="middle" font-size="10" font-family="Barlow,sans-serif" fill="#A09A94">${p.date}</text>
          `).join('')}
        </svg>
      </div>`;
  } else {
    document.getElementById('statsChart').innerHTML = '<div class="card-title">Évolution</div><p style="color:var(--text2);font-size:13px">Besoin de plus de tournées</p>';
  }

  // Managers
  const mgrStats = {};
  history.forEach(h => {
    if(!mgrStats[h.manager]) mgrStats[h.manager] = {count:0, sumPct:0, sumNok:0};
    mgrStats[h.manager].count++;
    mgrStats[h.manager].sumPct += h.pct;
    mgrStats[h.manager].sumNok += h.nok;
  });
  document.getElementById('statsMgr').innerHTML = `
    <div class="card-title">Managers</div>
    ${Object.entries(mgrStats).sort((a,b) => b[1].sumPct/b[1].count - a[1].sumPct/a[1].count).map(([mgr,s]) => {
      const avg = Math.round(s.sumPct/s.count);
      const cls = avg>=90?'b-ok':avg>=70?'b-warn':'b-nok';
      return `<div class="mgr-row">
        <div class="mgr-name">${mgr}</div>
        <div class="mgr-stats">
          <span class="badge ${cls}">${avg}%</span>
          <span style="font-size:12px;color:var(--text2)">${s.count} tournée${s.count>1?'s':''}</span>
        </div>
      </div>`;
    }).join('')}`;
}

// ══════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════
function saveConfig() {
  saveCfgStorage();
  saveStorage();
  renderManagerSelect();
  updRestName();
  const a = document.getElementById('cfgAlert');
  a.classList.add('show');
  setTimeout(() => a.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════════════════════
// EXPORT CSV
// ══════════════════════════════════════════════════════════
function exportCSV() {
  if(!history.length) { alert('Aucune donnée à exporter'); return; }
  const rows = [['Date','Heure','Manager','Service','OK','NOK','N/A','Conformité (%)','Points NOK','Observations']];
  history.forEach(h => rows.push([
    h.date, h.time, h.manager, h.service, h.ok, h.nok, h.na, h.pct,
    (h.nokItems||[]).join(' / '), h.note||''
  ]));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'BK_Historique_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// START
// ══════════════════════════════════════════════════════════
init();
</script>
